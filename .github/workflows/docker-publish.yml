name: Publish Docker Image

on:
  push:
    branches:
      - main
#    tags:
#      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout realworld specs
        uses: actions/checkout@v4
        with:
          repository: gothinkster/realworld
          path: realworld-specs

      - name: Install hurl
        run: |
          VERSION=$(curl -s https://api.github.com/repos/Orange-OpenSource/hurl/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -LO https://github.com/Orange-OpenSource/hurl/releases/download/${VERSION}/hurl_${VERSION}_amd64.deb
          sudo apt install ./hurl_${VERSION}_amd64.deb

      - name: Run integration tests
        run: make int-tests SPECS_DIR=realworld-specs

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run gRPC integration tests
        run: make int-tests-grpc

